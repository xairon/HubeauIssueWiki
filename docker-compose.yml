services:
  ollama:
    image: ollama/ollama:latest
    container_name: hubeau-ollama
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_KEEP_ALIVE=0
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      - ollama
    profiles:
      - pipeline

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hubeau-backend
    volumes:
      - ./site:/app/site:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    profiles:
      - serve

  site:
    image: nginx:alpine
    container_name: hubeau-site
    ports:
      - "49506:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - serve

volumes:
  ollama_models:
